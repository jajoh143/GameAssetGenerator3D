<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameAssetGenerator3D — Character Builder</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/examples/jsm/loaders/GLTFLoader.js": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/loaders/GLTFLoader.js",
      "three/examples/jsm/controls/OrbitControls.js": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/controls/OrbitControls.js"
    }
  }
  </script>
</head>
<body>
<div id="app">

  <!-- Header -->
  <header>
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="28" height="28" rx="6" fill="#4a90e2" fill-opacity="0.18"/>
      <path d="M14 5 L20 9 L20 17 L14 21 L8 17 L8 9 Z" stroke="#4a90e2" stroke-width="1.5" fill="none"/>
      <path d="M14 5 L14 21 M8 9 L20 17 M20 9 L8 17" stroke="#4a90e2" stroke-width="1" opacity="0.5"/>
    </svg>
    <h1>Character Builder</h1>
    <span class="subtitle">GameAssetGenerator3D</span>
  </header>

  <!-- Main content -->
  <div id="main">

    <!-- Left: options sidebar -->
    <div id="sidebar">
      <div id="form-scroll">

        <!-- Character section -->
        <div class="section">
          <div class="section-header">Character</div>
          <div class="section-body">
            <div class="field-row">
              <div class="field">
                <label for="preset">Preset</label>
                <select id="preset" name="preset">
                  <option value="average" selected>Average</option>
                  <option value="tall">Tall</option>
                  <option value="short">Short</option>
                  <option value="child">Child</option>
                  <option value="brute">Brute</option>
                  <option value="slender">Slender</option>
                </select>
              </div>
              <div class="field">
                <label for="build">Build</label>
                <select id="build" name="build">
                  <option value="lean">Lean</option>
                  <option value="average" selected>Average</option>
                  <option value="stocky">Stocky</option>
                  <option value="heavy">Heavy</option>
                </select>
              </div>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="gender">Gender</label>
                <select id="gender" name="gender">
                  <option value="neutral" selected>Neutral</option>
                  <option value="male">Male</option>
                  <option value="female">Female</option>
                </select>
              </div>
              <div class="field">
                <label for="lod">Level of Detail</label>
                <select id="lod" name="lod">
                  <option value="very_low">Very Low</option>
                  <option value="low">Low</option>
                  <option value="mid" selected>Mid</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Appearance section -->
        <div class="section">
          <div class="section-header">Appearance</div>
          <div class="section-body">
            <div class="field">
              <label for="skin_tone">Skin Tone</label>
              <select id="skin_tone" name="skin_tone">
                <option value="light">Light</option>
                <option value="fair">Fair</option>
                <option value="medium">Medium</option>
                <option value="olive">Olive</option>
                <option value="tan" selected>Tan</option>
                <option value="brown">Brown</option>
                <option value="dark">Dark</option>
              </select>
            </div>
            <div class="field-row">
              <div class="field">
                <label for="hair_style">Hair Style</label>
                <select id="hair_style" name="hair_style">
                  <option value="none">None</option>
                  <option value="buzzed">Buzzed</option>
                  <option value="short" selected>Short</option>
                  <option value="spiky">Spiky</option>
                  <option value="slicked">Slicked</option>
                  <option value="long">Long</option>
                  <option value="mohawk">Mohawk</option>
                  <option value="ponytail">Ponytail</option>
                </select>
              </div>
              <div class="field" id="hair-color-field">
                <label for="hair_color">Hair Color</label>
                <select id="hair_color" name="hair_color">
                  <option value="black">Black</option>
                  <option value="dark_brown">Dark Brown</option>
                  <option value="brown" selected>Brown</option>
                  <option value="auburn">Auburn</option>
                  <option value="red">Red</option>
                  <option value="blonde">Blonde</option>
                  <option value="platinum">Platinum</option>
                  <option value="white">White</option>
                  <option value="grey">Grey</option>
                  <option value="blue">Blue</option>
                  <option value="green">Green</option>
                  <option value="purple">Purple</option>
                  <option value="pink">Pink</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Clothing section -->
        <div class="section">
          <div class="section-header">Clothing</div>
          <div class="section-body">

            <!-- Top -->
            <div class="clothing-item">
              <div class="clothing-item-label">Top</div>
              <div class="field">
                <label for="clothing_top">Style</label>
                <select id="clothing_top" name="clothing_top">
                  <option value="none">None</option>
                  <option value="short_sleeve" selected>Short Sleeve</option>
                  <option value="long_sleeve">Long Sleeve</option>
                  <option value="v_neck">V-Neck</option>
                </select>
              </div>
              <div class="field" id="top-color-field">
                <label for="top_color">Color</label>
                <select id="top_color" name="top_color">
                  <option value="white">White</option>
                  <option value="black">Black</option>
                  <option value="grey">Grey</option>
                  <option value="red">Red</option>
                  <option value="blue" selected>Blue</option>
                  <option value="green">Green</option>
                  <option value="brown">Brown</option>
                  <option value="tan">Tan</option>
                  <option value="navy">Navy</option>
                  <option value="purple">Purple</option>
                  <option value="orange">Orange</option>
                  <option value="yellow">Yellow</option>
                  <option value="denim">Denim</option>
                  <option value="light_denim">Light Denim</option>
                </select>
              </div>
            </div>

            <!-- Bottom -->
            <div class="clothing-item">
              <div class="clothing-item-label">Bottom</div>
              <div class="field">
                <label for="clothing_bottom">Style</label>
                <select id="clothing_bottom" name="clothing_bottom">
                  <option value="none">None</option>
                  <option value="shorts">Shorts</option>
                  <option value="jeans" selected>Jeans</option>
                </select>
              </div>
              <div class="field" id="bottom-color-field">
                <label for="bottom_color">Color</label>
                <select id="bottom_color" name="bottom_color">
                  <option value="white">White</option>
                  <option value="black">Black</option>
                  <option value="grey">Grey</option>
                  <option value="red">Red</option>
                  <option value="blue">Blue</option>
                  <option value="green">Green</option>
                  <option value="brown">Brown</option>
                  <option value="tan">Tan</option>
                  <option value="navy">Navy</option>
                  <option value="purple">Purple</option>
                  <option value="orange">Orange</option>
                  <option value="yellow">Yellow</option>
                  <option value="denim" selected>Denim</option>
                  <option value="light_denim">Light Denim</option>
                </select>
              </div>
            </div>

          </div>
        </div>

        <!-- Animations section -->
        <div class="section">
          <div class="section-header">Animations</div>
          <div class="section-body">
            <div class="anim-controls">
              <button type="button" id="anim-select-all">Select All</button>
              <button type="button" id="anim-clear">Clear</button>
            </div>
            <div class="anim-grid">
              <label class="anim-check checked">
                <input type="checkbox" name="animations" value="idle" checked />
                <span>Idle</span>
              </label>
              <label class="anim-check checked">
                <input type="checkbox" name="animations" value="walk" checked />
                <span>Walk</span>
              </label>
              <label class="anim-check checked">
                <input type="checkbox" name="animations" value="run" checked />
                <span>Run</span>
              </label>
              <label class="anim-check checked">
                <input type="checkbox" name="animations" value="jump" checked />
                <span>Jump</span>
              </label>
              <label class="anim-check checked">
                <input type="checkbox" name="animations" value="attack" checked />
                <span>Attack</span>
              </label>
            </div>
          </div>
        </div>

      </div><!-- /form-scroll -->

      <!-- Action buttons -->
      <div id="actions">
        <button class="btn btn-preview" id="btn-preview" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
            <path d="M6 5.5 L11 8 L6 10.5 Z" fill="currentColor"/>
          </svg>
          Preview
        </button>
        <button class="btn btn-generate" id="btn-generate" type="button">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 8 L6 12 L14 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Generate Animations
        </button>
      </div>

      <!-- Status + log -->
      <div id="status-area">
        <div id="status-bar">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Ready</span>
        </div>
        <div id="log-box"></div>
        <div id="download-link">
          <a id="download-anchor" href="#" download>
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M7 1 L7 9 M4 6.5 L7 9.5 L10 6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M1 11 L1 13 L13 13 L13 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Download GLB
          </a>
        </div>
      </div>

    </div><!-- /sidebar -->

    <!-- Right: 3D viewer -->
    <div id="viewer-panel">
      <div id="viewer-toolbar">
        <button type="button" id="btn-reset-camera">Reset View</button>
        <button type="button" id="btn-toggle-grid">Grid</button>
        <button type="button" id="btn-toggle-wire">Wireframe</button>
      </div>

      <canvas id="viewer-canvas"></canvas>

      <!-- Empty state -->
      <div id="viewer-empty">
        <div class="empty-icon">&#x25A1;</div>
        <div class="empty-text">No model loaded</div>
        <div class="empty-hint">Click "Preview" to generate and view your character</div>
      </div>

      <!-- Loading overlay -->
      <div id="viewer-loading">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Running Blender…</div>
      </div>

      <!-- Info badge -->
      <div id="viewer-badge" id="viewer-badge"></div>
    </div>

  </div><!-- /main -->
</div><!-- /app -->

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/examples/jsm/controls/OrbitControls.js';

// ── Three.js setup ───────────────────────────────────────────────────────────

const canvas = document.getElementById('viewer-canvas');
const panel  = document.getElementById('viewer-panel');

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x1a1a2e, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a2e);

const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 200);
camera.position.set(0, 1.4, 3.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor  = 0.08;
controls.minDistance    = 0.5;
controls.maxDistance    = 30;
controls.target.set(0, 0.9, 0);
controls.update();

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
dirLight.position.set(3, 6, 4);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far  = 30;
dirLight.shadow.camera.left = dirLight.shadow.camera.bottom = -4;
dirLight.shadow.camera.right = dirLight.shadow.camera.top   =  4;
scene.add(dirLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 0.4);
fillLight.position.set(-3, 2, -2);
scene.add(fillLight);

// Grid
const grid = new THREE.GridHelper(10, 20, 0x2e2e55, 0x2e2e55);
grid.material.opacity = 0.6;
grid.material.transparent = true;
scene.add(grid);

// Shadow plane
const shadowGeo  = new THREE.PlaneGeometry(10, 10);
const shadowMat  = new THREE.ShadowMaterial({ opacity: 0.35 });
const shadowPlane = new THREE.Mesh(shadowGeo, shadowMat);
shadowPlane.rotation.x = -Math.PI / 2;
shadowPlane.receiveShadow = true;
scene.add(shadowPlane);

// State
let currentModel  = null;
let wireframeMode = false;
let defaultCamPos = new THREE.Vector3(0, 1.4, 3.5);
let defaultTarget = new THREE.Vector3(0, 0.9, 0);

// Resize handler
function resize() {
  const w = panel.clientWidth;
  const h = panel.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
new ResizeObserver(resize).observe(panel);

// Render loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// ── Model loading ────────────────────────────────────────────────────────────

const loader = new GLTFLoader();

function fitCameraToModel(model) {
  const box = new THREE.Box3().setFromObject(model);
  const size   = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  // Use character height (size.y) to drive distance — multiply by 0.75
  // so the full figure fills most of the viewport.
  const dist = size.y * 0.75;

  // Aim at mid-torso (~45 % up from feet) rather than geometric centre,
  // so the head isn't cropped and feet aren't wasted space.
  const targetY = box.min.y + size.y * 0.45;
  camera.position.set(center.x, targetY, center.z + dist);
  controls.target.set(center.x, targetY, center.z);
  controls.update();

  defaultCamPos.copy(camera.position);
  defaultTarget.copy(controls.target);
}

function loadModel(url, label) {
  return new Promise((resolve, reject) => {
    loader.load(
      url,
      (gltf) => {
        if (currentModel) {
          scene.remove(currentModel);
          currentModel.traverse(obj => {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
              const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
              mats.forEach(m => m.dispose());
            }
          });
        }

        const model = gltf.scene;
        model.traverse(obj => {
          if (obj.isMesh) {
            obj.castShadow = true;
            obj.receiveShadow = true;
          }
        });

        scene.add(model);
        currentModel = model;
        fitCameraToModel(model);

        // Update badge
        const badge = document.getElementById('viewer-badge');
        badge.textContent = label || 'Model loaded';
        badge.classList.add('visible');

        // Hide empty state
        document.getElementById('viewer-empty').classList.add('hidden');

        resolve(model);
      },
      undefined,
      reject
    );
  });
}

// ── Wireframe toggle ─────────────────────────────────────────────────────────

document.getElementById('btn-toggle-wire').addEventListener('click', () => {
  wireframeMode = !wireframeMode;
  if (currentModel) {
    currentModel.traverse(obj => {
      if (obj.isMesh) {
        const mats = Array.isArray(obj.material) ? obj.material : [obj.material];
        mats.forEach(m => { m.wireframe = wireframeMode; });
      }
    });
  }
  const btn = document.getElementById('btn-toggle-wire');
  btn.style.color       = wireframeMode ? 'var(--accent-blue)' : '';
  btn.style.borderColor = wireframeMode ? 'var(--accent-blue)' : '';
});

// ── Grid toggle ──────────────────────────────────────────────────────────────

document.getElementById('btn-toggle-grid').addEventListener('click', () => {
  grid.visible = !grid.visible;
  const btn = document.getElementById('btn-toggle-grid');
  btn.style.color       = grid.visible ? 'var(--accent-blue)' : '';
  btn.style.borderColor = grid.visible ? 'var(--accent-blue)' : '';
});

// ── Reset camera ─────────────────────────────────────────────────────────────

document.getElementById('btn-reset-camera').addEventListener('click', () => {
  camera.position.copy(defaultCamPos);
  controls.target.copy(defaultTarget);
  controls.update();
});

// ── Status helpers ───────────────────────────────────────────────────────────

const statusDot  = document.getElementById('status-dot');
const statusText = document.getElementById('status-text');
const logBox     = document.getElementById('log-box');
const loadingDiv = document.getElementById('viewer-loading');
const loadText   = document.getElementById('loading-text');
const dlLink     = document.getElementById('download-link');
const dlAnchor   = document.getElementById('download-anchor');

function setStatus(state, text) {
  statusDot.className = 'status-dot ' + state;
  statusText.textContent = text;
}

function showLog(lines) {
  if (!lines || !lines.length) return;
  logBox.classList.add('visible');
  logBox.textContent = lines.slice(-40).join('\n');
  logBox.scrollTop   = logBox.scrollHeight;
}

function setLoading(visible, text) {
  loadText.textContent = text || 'Running Blender…';
  loadingDiv.classList.toggle('visible', visible);
}

function setButtons(disabled) {
  document.getElementById('btn-preview').disabled  = disabled;
  document.getElementById('btn-generate').disabled = disabled;
}

// ── Collect form data ────────────────────────────────────────────────────────

function collectFormData() {
  const data = {};

  ['preset','build','gender','skin_tone','hair_style','hair_color','lod',
   'clothing_top','clothing_bottom','top_color','bottom_color'].forEach(id => {
    const el = document.getElementById(id);
    if (el) data[id] = el.value;
  });

  data.animations = Array.from(
    document.querySelectorAll('input[name="animations"]:checked')
  ).map(cb => cb.value);

  return data;
}

// ── Polling ──────────────────────────────────────────────────────────────────

function pollJob(jobId, onDone) {
  const interval = setInterval(async () => {
    try {
      const res  = await fetch(`/job/${jobId}`);
      const json = await res.json();
      showLog(json.log);

      if (json.status === 'done') {
        clearInterval(interval);
        onDone(null, json);
      } else if (json.status === 'error') {
        clearInterval(interval);
        onDone(new Error('Blender job failed'), json);
      }
    } catch (err) {
      clearInterval(interval);
      onDone(err, null);
    }
  }, 1500);
}

// ── Preview button ───────────────────────────────────────────────────────────

document.getElementById('btn-preview').addEventListener('click', async () => {
  const data = collectFormData();

  setButtons(true);
  setStatus('running', 'Generating preview…');
  setLoading(true, 'Running Blender (mesh only)…');
  dlLink.classList.remove('visible');
  logBox.textContent = '';

  let jobId;
  try {
    const res = await fetch('/preview', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    jobId = json.job_id;
  } catch (err) {
    setStatus('error', 'Network error: ' + err.message);
    setLoading(false);
    setButtons(false);
    return;
  }

  pollJob(jobId, async (err, job) => {
    setLoading(false);
    setButtons(false);

    if (err || job.status === 'error') {
      setStatus('error', 'Preview failed — check log');
      return;
    }

    setStatus('running', 'Loading model…');
    try {
      await loadModel(`/model/${jobId}`, 'Preview (mesh only)');
      setStatus('done', 'Preview loaded');
    } catch (loadErr) {
      setStatus('error', 'Failed to load GLB: ' + loadErr.message);
    }
  });
});

// ── Generate button ──────────────────────────────────────────────────────────

document.getElementById('btn-generate').addEventListener('click', async () => {
  const data = collectFormData();

  if (!data.animations.length) {
    setStatus('error', 'Select at least one animation');
    return;
  }

  setButtons(true);
  setStatus('running', 'Generating full asset…');
  setLoading(true, 'Running Blender with animations…');
  dlLink.classList.remove('visible');
  logBox.textContent = '';

  let jobId;
  try {
    const res = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    jobId = json.job_id;
  } catch (err) {
    setStatus('error', 'Network error: ' + err.message);
    setLoading(false);
    setButtons(false);
    return;
  }

  pollJob(jobId, async (err, job) => {
    setLoading(false);
    setButtons(false);

    if (err || job.status === 'error') {
      setStatus('error', 'Generation failed — check log');
      return;
    }

    setStatus('running', 'Loading model…');
    try {
      await loadModel(`/model/${jobId}`, 'Full asset with animations');
      setStatus('done', 'Generated successfully!');
    } catch (loadErr) {
      setStatus('error', 'Failed to load GLB: ' + loadErr.message);
    }

    if (job.download_url) {
      dlAnchor.href = job.download_url;
      dlAnchor.download = `humanoid_${jobId.slice(0, 8)}.glb`;
      dlLink.classList.add('visible');
    }
  });
});

// ── Animation checkbox styling ───────────────────────────────────────────────

document.querySelectorAll('.anim-check input[type="checkbox"]').forEach(cb => {
  cb.addEventListener('change', () => {
    cb.closest('.anim-check').classList.toggle('checked', cb.checked);
  });
});

document.getElementById('anim-select-all').addEventListener('click', () => {
  document.querySelectorAll('.anim-check input[type="checkbox"]').forEach(cb => {
    cb.checked = true;
    cb.closest('.anim-check').classList.add('checked');
  });
});

document.getElementById('anim-clear').addEventListener('click', () => {
  document.querySelectorAll('.anim-check input[type="checkbox"]').forEach(cb => {
    cb.checked = false;
    cb.closest('.anim-check').classList.remove('checked');
  });
});

// ── Hair color visibility ────────────────────────────────────────────────────

const hairStyleSel = document.getElementById('hair_style');
const hairColorField = document.getElementById('hair-color-field');

function updateHairColorVisibility() {
  hairColorField.style.display = (hairStyleSel.value === 'none') ? 'none' : '';
}
hairStyleSel.addEventListener('change', updateHairColorVisibility);
updateHairColorVisibility();

// ── Clothing color visibility ────────────────────────────────────────────────

const topSel = document.getElementById('clothing_top');
const topColorField = document.getElementById('top-color-field');
topSel.addEventListener('change', () => {
  topColorField.style.display = (topSel.value === 'none') ? 'none' : '';
});

const bottomSel = document.getElementById('clothing_bottom');
const bottomColorField = document.getElementById('bottom-color-field');
bottomSel.addEventListener('change', () => {
  bottomColorField.style.display = (bottomSel.value === 'none') ? 'none' : '';
});

</script>
</body>
</html>
